services:
  web-builder:
    image: node:22-bookworm-slim
    working_dir: /workspace
    environment:
      EXPO_PUBLIC_API_BASE_URL: /api
    command: >
      bash -lc "npm ci && npx expo export --platform web --output-dir dist-web"
    volumes:
      - ..:/workspace

  api:
    build:
      context: ..
      dockerfile: Dockerfile.api
    env_file:
      - ./.env.production
    environment:
      PORT: 4000
      NODE_ENV: production
    volumes:
      - ../logs:/app/logs
    restart: unless-stopped

  caddy:
    image: caddy:2.10
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../dist-web:/srv:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  duckdns:
    image: alpine:3.22
    env_file:
      - ./.env.production
    command: /bin/sh /duckdns/update-duckdns.sh
    volumes:
      - ./duckdns/update-duckdns.sh:/duckdns/update-duckdns.sh:ro
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
